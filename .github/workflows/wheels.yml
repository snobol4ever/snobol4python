# ============================================================================
# wheels.yml — Build binary wheels + sdist and publish to PyPI
# ============================================================================
# Triggered by pushing a version tag:  git tag v0.5.0-rc6 && git push --tags
#
# Strategy:
#   • cibuildwheel builds manylinux / musllinux / macOS / Windows wheels
#     for CPython 3.10, 3.11, 3.12 across x86_64 and arm64.
#   • A pure sdist is also built (for the pure-Python fallback on any platform).
#   • All artefacts are uploaded to PyPI in a single Trusted Publisher job.
#
# Prerequisites (one-time setup):
#   1. On PyPI: Settings → Publishing → Add publisher
#        owner:       LCherryholmes
#        repo:        SNOBOL4python
#        workflow:    wheels.yml
#        environment: pypi
#   2. On GitHub: Settings → Environments → create "pypi"
# ============================================================================

name: Build & Publish Wheels

on:
  push:
    tags:
      - "v*"                  # e.g. v0.5.0-rc6
  workflow_dispatch:          # allow manual trigger from the Actions tab

jobs:
  # --------------------------------------------------------------------------
  # 1. Build wheels with cibuildwheel
  # --------------------------------------------------------------------------
  build-wheels:
    name: "Wheel · ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # Pre-install all target Pythons so cibuildwheel never has to download
      # them from python.org/ftp (which rate-limits GitHub Actions runners).
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.22.0

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_SKIP:  "*-win32 *-manylinux_i686 *-musllinux_i686 pp*"
          CIBW_ARCHS_MACOS: "arm64"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "pytest {project}/tests -v --import-mode=importlib --ignore={project}/tests/test_re_simple.py --ignore={project}/tests/test_json.py"
          CIBW_BUILD_FRONTEND: "build[uv]"

      - name: Upload wheel artefacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  # --------------------------------------------------------------------------
  # 2. Build sdist
  # --------------------------------------------------------------------------
  build-sdist:
    name: "sdist"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist artefact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # --------------------------------------------------------------------------
  # 3. Publish to PyPI via OIDC Trusted Publisher (no tokens needed)
  # --------------------------------------------------------------------------
  publish:
    name: "Publish to PyPI"
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artefacts
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1